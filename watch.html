<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Now Watching - MovieLix</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎬</text></svg>">
</head>
<body class="watch-page" data-page="watch">
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">Movie<span>Lix</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="movies.html">Movies</a></li>
          <li class="nav-item"><a class="nav-link" href="tvshows.html">TV Shows</a></li>
        </ul>
        <div class="nav-search-container">
          <div class="nav-search" id="navSearch">
            <input type="text" id="globalSearchInput" placeholder="Titles, people, genres" autocomplete="off">
            <button class="nav-search-close" id="closeSearch">&times;</button>
          </div>
          <button class="btn nav-link nav-search-toggle" type="button" id="searchToggle">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
              <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
            </svg>
          </button>
          <div class="nav-search-results" id="searchResults"></div>
        </div>
      </div>
    </div>
  </nav>

  <div class="player-wrapper" id="playerWrapper">
    <div class="text-center py-5 mt-5">
      <div class="spinner"></div>
      <p class="text-muted mt-3">Loading player...</p>
    </div>
  </div>

  <div class="movie-info-section" id="movieInfo">
    <p class="text-muted">Loading info...</p>
  </div>

  <div id="episodesSection"></div>

  <div id="moreContent"></div>

  <footer class="footer">
    <div class="container-fluid">
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="movies.html">Movies</a>
        <a href="tvshows.html">TV Shows</a>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 MovieLix. All rights reserved. Powered by VidAPI.</p>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
